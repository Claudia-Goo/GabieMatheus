<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obra da Gabi e do Matheus</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #18bc9c;
            --bg-light: #f8f9fa;
            --border-color: #dee2e6;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-light);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* --- MENUS LATERAIS (CÔMODOS) --- */
        #sidebar {
            width: 320px;
            background-color: var(--primary);
            color: white;
            padding: 20px;
            overflow-y: auto;
            height: 100vh;
            position: fixed;
        }

        #sidebar h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--secondary);
            text-align: center;
        }

        .room-bucket {
            margin-bottom: 15px;
        }

        .room-title {
            background-color: #34495e;
            padding: 12px 10px;
            width: 100%;
            text-align: left;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.95rem;
        }

        .room-title:hover {
            background-color: #415b76;
        }

        .dropdown-content {
            display: none;
            background-color: #1a252f;
            padding: 10px 15px;
            border-radius: 0 0 4px 4px;
        }

        .task-item {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            margin: 10px 0;
            color: #ecf0f1;
        }

        .task-item input {
            margin-right: 10px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        #main-content {
            margin-left: 320px;
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        header h1 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        /* --- CRONOGRAMA GANTT --- */
